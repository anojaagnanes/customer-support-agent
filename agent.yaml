spec_version: "0.1.0"
name: customer-support-agent
version: 0.1.0
description: AI agent for customer support tasks
author: Anojaa Gnanes
license: MIT

model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 500

skills:
  - hello-world
  - greet
  - faq
  - troubleshoot   # <-- This is where you list all skills

tools:
  - none

runtime:
  max_turns: 5
  timeout: 60